spring.application.name=personalproject
spring.thymeleaf.cache=false

# Configuración del puerto (necesario para la nube)
server.port=${PORT:8080}

# 1. Conexión a la base de datos
# En local usa localhost, en la nube usará la variable DB_URL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecomerce_db}

# 2. Tus credenciales
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

