spring.application.name=personalproject
spring.thymeleaf.cache=false
# 1. Conexión a la base de datos
# Asegúrate que 'tienda_db' coincida con lo que creaste en el Paso 1
spring.datasource.url=jdbc:mysql://localhost:3306/ecomerce_db

# 2. Tus credenciales
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform= org.hibernate.dialect.MySQLDialect

# 3. Configuración de JPA / Hibernate
# Esto crea las tablas automáticamente basándose en tus clases @Entity
spring.jpa.hibernate.ddl-auto=update

# (Opcional) Muestra el SQL en la consola para ver qué hace
spring.jpa.show-sql=true