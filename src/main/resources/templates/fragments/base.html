<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head-content">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WilberMart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/product-card.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/webjars/sweetalert2/dist/sweetalert2.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- Navbar de Bootstrap -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4" th:fragment="navigation">
        <div class="container">
            <!-- Logo y Marca -->
            <a class="navbar-brand d-flex align-items-center fw-bold" th:href="@{/view/index}">
                <img src="/img/company-logo.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top me-2">
                WilberMart
            </a>

            <!-- Botón Hamburguesa para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Contenido colapsable -->
            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- Buscador (Centrado o a la izquierda según prefieras, aquí lo pongo con margen automático para empujar lo demás) -->
                <form class="d-flex ms-auto me-3 my-2 my-lg-0 search-form" th:action="@{/view/products/list}" method="get">
                    <input class="form-control me-2 border-0 bg-transparent" type="search" name="name" th:value="${name}" placeholder="Buscar productos..." aria-label="Search">
                    <button class="btn btn-link text-secondary p-0" type="submit"><i class="fas fa-search"></i></button>
                </form>

                <!-- Enlaces de navegación -->
                <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view/index}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view/products/list}">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view/categories/list}">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view/cart}"><i class="fas fa-shopping-cart"></i></a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link dropdown-toggle bg-success text-white rounded-pill px-3" href="#" id="navbarDropdownMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Cargar
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" th:href="@{/view/products/load}">Cargar producto</a></li>
                            <li><a class="dropdown-item" th:href="@{/view/categories/load}">Cargar categoría</a></li>
                        </ul>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/view/login}">Iniciar sesión</a>
                    </li>

                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link border-0" style="text-decoration: none;">
                                Cerrar sesión <i class="fas fa-sign-out-alt"></i>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="d-flex justify-content-center align-items-center py-4 text-muted mt-5 border-top gap-3">

        <div>
            <a href="https://github.com/LucianoWil"
               target="_blank"
               rel="noopener noreferrer"
               class="text-decoration-none text-muted me-2"
               aria-label="GitHub Profile">
                <i class="bi bi-github fs-4"></i>
            </a>

            <a href="https://www.linkedin.com/in/luciano-wilberger-b47107277/"
               target="_blank"
               rel="noopener noreferrer"
               class="text-decoration-none text-muted"
               aria-label="LinkedIn Profile">
                <i class="bi bi-linkedin fs-4"></i>
            </a>
        </div>

        <div class="border-end" style="height: 20px;"></div>

        <p class="mb-0">&copy; 2025 WilberMart</p>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script th:inline="javascript">
            /*<![CDATA[*/

            var mensaje = /*[[${mensaje}]]*/ null;
            var tipo = /*[[${tipo}]]*/ null;

            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });

            // Decidimos qué mostrar si hay mensaje
            if (mensaje !== null) {
                if (tipo === 'success') {
                    Toast.fire({
                        icon: 'success',
                        title: mensaje
                    });
                } else {
                    Swal.fire({
                        title: 'Notificación',
                        text: mensaje,
                        icon: tipo, // 'error', 'warning', 'info'
                        confirmButtonText: 'Aceptar'
                    });
                }
            }
            /*]]>*/
        </script>
    </footer>
</body>
</html>
