<!DOCTYPE html>
<html lang="es">
<head th:replace="~{fragments/base :: head-content}">
    <title>Inicio</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<!-- Carrusel -->
<div id="mainCarousel" class="carousel slide" data-bs-ride="carousel" style="margin-bottom: 30px;">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="https://placehold.co/1200x400/2c3e50/white?text=Bienvenido+a+WilberMart" class="d-block w-100" alt="Banner 1" style="height: 400px; object-fit: cover;">
            <div class="carousel-caption d-none d-md-block">
                <h5>Grandes Ofertas</h5>
                <p>Encuentra los mejores productos al mejor precio.</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="https://placehold.co/1200x400/e67e22/white?text=Nuevos+Productos" class="d-block w-100" alt="Banner 2" style="height: 400px; object-fit: cover;">
            <div class="carousel-caption d-none d-md-block">
                <h5>Novedades</h5>
                <p>Descubre lo último en tecnología y moda.</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="https://placehold.co/1200x400/27ae60/white?text=Envio+Gratis" class="d-block w-100" alt="Banner 3" style="height: 400px; object-fit: cover;">
            <div class="carousel-caption d-none d-md-block">
                <h5>Envío Rápido</h5>
                <p>Recibe tus compras en la puerta de tu casa.</p>
            </div>
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Anterior</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Siguiente</span>
    </button>
</div>

<div class="main-container">
    <h1>Productos destacados</h1>

    <!-- Contenedor Grid para los productos -->
    <div th:if="${products == null or products.isEmpty()}">
        <h3>Producto no encontrado</h3>
    </div>
    <div class="products-grid" th:if="${products != null and !products.isEmpty()}">
        <div class="product-card" th:each="product :${products}">
            <a th:href="@{/view/products/{id}(id=${product.id})}">
                <div class="product-image-section">
                    <!-- Si hay URL de imagen, mostramos la imagen -->
                    <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                         th:src="${product.imageUrl}"
                         alt="Imagen del producto"
                         class="product-img">

                    <!-- Si NO hay URL, mostramos el placeholder -->
                    <img th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                         th:src="@{/img/product-placeholder.jpg}"
                         alt="Imagen placeholder"
                         class="product-img">
                </div>
                <div class="product-info">
                    <h2 th:text="${product.name}"> </h2>
                    <p class="description-preview" th:text="${product.description}"> </p>
                    <p class="price" th:text="'$' + ${product.price}"> </p>
                    <div class="stock-status">
                            <span th:if="${product.stock > 0}" class="in-stock">
                                <i class="fas fa-check-circle"></i> Disponible
                            </span>
                        <span th:unless="${product.stock > 0}" class="out-of-stock">
                                <i class="fas fa-times-circle"></i> Agotado
                            </span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

</body>
</html>
