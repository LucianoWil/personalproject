<!DOCTYPE html>
<html lang="es">
<head th:replace="~{fragments/base :: head-content}">
    <title>Carrito de Compras</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">
    <h1>Tu carrito de compras</h1>

    <div class="cart-container mx-auto">
        <div class="cart-items">
            <div th:if="${cart == null or cart.isEmpty()}" class="empty-cart">
                <p>Tu carrito está vacío.</p>
                <a th:href="@{/view/products/list}" class="btn-continue-shopping">Continuar comprando</a>
            </div>

            <div th:if="${cart != null and !cart.isEmpty()}">
                <div th:each="productItem : ${cart}" class="cart-item">
                    <div class="cart-item-image">
                        <img th:if="${productItem.getProduct().imageUrl != null and !productItem.getProduct().imageUrl.isEmpty()}"
                             th:src="${productItem.getProduct().imageUrl}"
                             alt="Imagen del producto">
                        <img th:unless="${productItem.getProduct().imageUrl != null and !productItem.getProduct().imageUrl.isEmpty()}"
                             th:src="@{/img/product-placeholder.jpg}"
                             alt="Imagen placeholder">
                    </div>
                    <div class="cart-item-details">
                        <h3 th:text="${productItem.getProduct().name}">Nombre del Producto</h3>
                        <p class="mb-0" th:text="'Precio Unitario: $' + ${productItem.getProduct().getPrice()}"></p>
                        <p class="item-price mt-0" th:id="'price-' + ${productItem.getProduct().getId()}" th:data-unitprice="${productItem.getProduct().price}" th:text="'$' + ${productItem.getProduct().price * productItem.getQuantity()}">$0.00</p>
                    </div>
                    <div class="cart-item-actions">
                        <div class="input-group" style="max-width: 150px;">
                            <button  class="btn btn-outline-secondary"
                                     type="button"
                                     th:data-userid="${user_id}"
                                     th:data-productid="${productItem.getProduct().getId()}"
                                     onclick="updateQuantity(this.getAttribute('data-userid'), this.getAttribute('data-productid') , -1, false)">-</button>

                            <input type="number" class="form-control text-center"
                                   th:value="${productItem.getQuantity()}"
                                   th:id="|quantity-input-${productItem.getProduct().getId()}|"
                                   th:data-userid="${user_id}"
                                   th:data-productid="${productItem.getProduct().getId()}"
                                   th:data-stock="${productItem.getProduct().getStock()}"
                                   min="1"
                                   th:max="${productItem.getProduct().getStock()}"
                                   onchange="updateQuantity(this.getAttribute('data-userid'), this.getAttribute('data-productid') , this.value, true)">

                            <button class="btn btn-outline-secondary"
                                    type="button"
                                    th:data-userid="${user_id}"
                                    th:data-productid="${productItem.getProduct().getId()}"
                                    onclick="updateQuantity(this.getAttribute('data-userid'), this.getAttribute('data-productid') , 1, false)">+</button>
                        </div>
                        <button type="button" class="btn btn-danger ms-4 mt-3"
                                th:data-userid="${user_id}"
                                th:data-productid="${productItem.getProduct().getId()}"
                                onclick="deleteItem(this.getAttribute('data-userid'), this.getAttribute('data-productid'))">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Resumen del pedido -->
        <div class="cart-summary" th:if="${cart != null and !cart.isEmpty()}">
            <h2>Resumen del Pedido</h2>
            <div class="summary-row">
                <span>Total Productos</span>
                <span id="cart-total" th:text="'$' + ${#aggregates.sum(cart.![product.price * quantity])}">$0.00</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <!-- Calculamos el total sumando los precios de los productos -->
               <!-- <span th:text="'$' + ${#aggregates.sum(cart.![price])}">$0.00</span> -->
            </div>
            <form th:action="@{/view/cart/emptyCart/{isPurchase}(isPurchase=true)}" th:method="get" style="display:inline;">
                <button class="btn-checkout" onclick="purchase(event, true)">Proceder al Pago</button>
            </form>
        </div>
        <form th:action="@{/view/cart/emptyCart/{isPurchase}(isPurchase=false)}" th:method="get" style="display:inline;">
            <button type="button" class="btn btn-danger ms-4 mt-3" onclick="purchase(event, false)"><i class="fas fa-trash"></i> Vaciar carrito</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

<script>
    function updateQuantity(userId, productId, quantity, isManualChange){
        var changeValue = parseInt(quantity, 10);

        if (isNaN(changeValue) || (changeValue < 1 && isManualChange)) {
            changeValue = 1;
        }

        const quantityItem = document.getElementById('quantity-input-' + productId);
        const maxStock = parseInt(quantityItem.getAttribute('data-stock'), 10);
        //const currentText = quantityItem.innerText;
        //const currentQuantity = parseInt(currentText, 10);
        const currentQuantity = parseInt(quantityItem.value, 10);

        var newQuantity = 0;
        if(isManualChange){
            newQuantity = changeValue;
        }
        else{
            newQuantity = currentQuantity + changeValue;
        }

        if (newQuantity < 0){
            return;
        }

        if (newQuantity > maxStock) {
            Swal.fire({
                title: 'Límite de producto',
                text: 'Lo sentimos, solo tenemos ' + maxStock + ' unidades en stock',
                icon: 'error',
                confirmButtonText: 'Aceptar'
            })
            newQuantity = maxStock;
        }

        const data = {
            productId: productId,
            quantity: newQuantity,
        };

        fetch('/users/changeProductQuantity/' + userId, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response =>{
                if (response.ok){
                    //quantityItem.innerText = 'Cantidad: ' + newQuantity;
                    quantityItem.value = newQuantity;

                    const priceElement = document.getElementById('price-' + productId);
                    const unitPrice = parseFloat(priceElement.getAttribute('data-unitprice'));
                    priceElement.innerText = '$' + (unitPrice * newQuantity);

                    updateCartTotal();

                    if (newQuantity <= 0) {
                        location.reload();
                    }
                }
                else{
                    alert('Error al cambiar la cantidad del producto');
                }
            })
            .catch(error => {
                console.error('Error', error);
                alert(('Error al cambiar la cantidad del producto'));
            })
    }

    function updateCartTotal() {
        let total = 0;
        document.querySelectorAll('.item-price').forEach(item => {
            const price = parseFloat(item.innerText.replace('$', ''));
            if (!isNaN(price)) {
                total += price;
            }
        });
        const totalElement = document.getElementById('cart-total');
        if (totalElement) {
            totalElement.innerText = '$' + total;
        }
    }

    function deleteItem(userId, productId){
        const data = {
            productId: productId,
        };

        fetch('/users/deleteProduct/' + userId, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        }).then(response =>{
            if(response.ok){
                location.reload();
            }
            else{
                alert('Error al eliminar el producto');
            }
    })
        .catch(error => {
        console.error('Error', error);
        alert('Error al eliminar el producto');
    })}

    function purchase(event, isPurchase) {
        event.preventDefault();

        const form = event.target.closest('form');

        if (isPurchase){
        Swal.fire({
            title: 'Producto comprado con exito',
            text: 'Armaremos su pedido y lo enviaremos a su dirección',
            icon: 'success',
            confirmButtonText: 'Aceptar'
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit();
            }
        });}
        else{
            form.submit();
        }
    }
</script>
</body>
</html>
