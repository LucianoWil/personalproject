<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head-content}">
  <title>Cargar categoría</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">
  <div class="login-container">
    <h2>Cargar categoría</h2>

    <div th:if="${error}" class="alert alert-danger" style="color: red; margin-bottom: 10px;">
      <p th:text="${error}"></p>
    </div>

    <form th:action="@{/view/categories/load}" method="post" class="login-form">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="text" id="name" name="name" required placeholder="Ingresa la categoría">
      </div>

      <div class="form-group">
        <label for="imageUrl">Imagen</label>
        <input type="text" id="imageUrl" name="imageUrl" required placeholder="Ingresa el link a una imagen">
      </div>
      <button type="submit" class="btn-login">Cargar</button>
    </form>
  </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

</body>
</html>
