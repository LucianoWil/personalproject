<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head-content}">
    <title>Registrarse</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">
    <div class="login-container">
        <h2>Registrarse</h2>

        <!-- Mensaje de error si existe -->
        <div th:if="${error}" class="alert alert-danger" style="color: red; margin-bottom: 10px;">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/register}" method="post" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario">
            </div>

            <div class="form-group">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" required placeholder="Ingresa tu correo">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
            </div>
            <button type="submit" class="btn-login">Registrarse</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

</body>
</html>
