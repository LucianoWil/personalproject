<!DOCTYPE html>
<html lang="es">
<head th:replace="~{fragments/base :: head-content}">
    <title>Iniciar Sesión</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">
    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username">Correo Electrónico</label>
                <input type="text" id="username" name="username" required placeholder="Ingresa tu correo">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
            </div>

            <div th:if="${error}" class="error-message">
                <p th:text="${error}">Error de autenticación</p>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>
        <div class="register-link">
            <p>¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a></p>
        </div>
    </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

</body>
</html>
