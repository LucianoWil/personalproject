<!DOCTYPE html>
<html lang="es">
<head th:replace="~{fragments/base :: head-content}">
    <title>Iniciar Sesión</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">
    <div class="row justify-content-center align-items-start">
        <!-- Columna del Formulario de Login -->
        <div class="col-md-7">
            <div class="login-container">
                <h2>Iniciar Sesión</h2>
                <form th:action="@{/login}" method="post" class="login-form">
                    <div class="form-group">
                        <label for="username">Correo Electrónico</label>
                        <input type="text" id="username" name="username" required placeholder="Ingresa tu correo">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                    </div>

                    <div th:if="${error}" class="error-message">
                        <p th:text="${error}" style="text-align: center">Error de autenticación</p>
                    </div>

                    <button type="submit" class="btn-login">Ingresar</button>
                </form>
                <div class="register-link">
                    <p>¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a></p>
                </div>
            </div>
        </div>

        <!-- Columna del Aviso (Credenciales de prueba) -->
        <div class="col-md-4 mt-4 mt-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-info-circle me-2"></i>Credenciales de Prueba</h5>
                </div>
                <div class="card-body">
                    <p class="card-text">Utiliza estas cuentas para probar el sistema:</p>

                    <h6 class="fw-bold text-success">Usuario Administrador</h6>
                    <ul class="list-unstyled mb-3">
                        <li><strong>Email:</strong> admin@wilbermart.com</li>
                        <li><strong>Contraseña:</strong> Admin123</li>
                    </ul>

                    <h6 class="fw-bold text-primary">Usuario Común</h6>
                    <ul class="list-unstyled mb-0">
                        <li><strong>Email:</strong> user@wilbermart.com</li>
                        <li><strong>Contraseña:</strong> User123</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

</body>
</html>
