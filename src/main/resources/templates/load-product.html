<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head-content}">
    <title>Cargar Producto</title>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">
    <div class="login-container">
        <h2>Cargar producto</h2>

        <div th:if="${error}" class="alert alert-danger" style="color: red; margin-bottom: 10px;">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/view/products/load}" method="post" class="login-form">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" required placeholder="Ingresa el producto">
            </div>

            <div class="form-group">
                <label for="price">Precio</label>
                <input type="number" id="price" name="price" required placeholder="Ingresa el precio">
            </div>
            <div class="form-group">
                <label for="description">Descripción</label>
                <input type="text" id="description" name="description" required placeholder="Ingresa la descripción">
            </div>
            <div class="form-group">
                <label for="categoryId">Categoría</label>
                <select id="categoryId" name="categoryId" class="form-control" required>
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label for="stock">Stock</label>
                <input type="number" id="stock" name="stock" required placeholder="Ingresa el stock actual">
            </div>
            <div class="form-group">
                <label for="imageUrl">Imagen</label>
                <input type="text" id="imageUrl" name="imageUrl" required placeholder="Ingresa el link a una imagen">
            </div>
            <div class="form-group">
                <label for="isFeatured">Producto destacado</label>
                <div style="display: flex; align-items: center;">
                    <input type="checkbox" id="isFeatured" name="isFeatured" style="width: auto; margin-right: 10px;">
                    <p style="margin: 0;">¿Es un producto destacado?</p>
                </div>
            </div>
            <button type="submit" class="btn-login">Cargar</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/base :: footer}"></div>

</body>
</html>
