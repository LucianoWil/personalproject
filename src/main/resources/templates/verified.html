<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación de cuenta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/favicon.png" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh;">
<div class="card shadow p-4 text-center" style="width: 400px;">
    <h3 class="mb-3">Verificación de cuenta</h3>

    <!-- Mensaje de alerta -->
    <div th:if="${success}" class="alert alert-success" role="alert" th:text="${message}"></div>
    <div th:if="${!success}" class="alert alert-danger" role="alert" th:text="${message}"></div>

    <a href="/view/login" class="btn btn-primary mt-3">Iniciar sesión</a>
</div>
</body>
</html>
