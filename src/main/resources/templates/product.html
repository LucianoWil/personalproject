<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head-content}">
    <title th:text="${product != null} ? ${product.name} : 'Producto no encontrado'">Detalle de Producto</title>
    <script>
        function toggleVisibility(id) {
            var element = document.getElementById(id);
            if (element.style.display === "none") {
                element.style.display = "block";
            } else {
                element.style.display = "none";
            }
        }
    </script>
</head>
<body>

<div th:replace="~{fragments/base :: navigation}"></div>

<div class="main-container">

    <div id="noLogued" style="display: none">
        <h1>Debes iniciar sesión para agregar un producto</h1>
    </div>

    <div th:if="${product}" class="product-detail-container">

        <div class="product-image-section">
            <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                 th:src="${product.imageUrl}"
                 alt="Imagen del producto"
                 class="product-img">

            <div th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}" class="image-placeholder">
                <i class="fas fa-camera fa-3x"></i>
                <p>Imagen del producto</p>
            </div>
        </div>

        <div class="product-info-section">
            <span class="category-tag" th:text="${category}">Categoría General</span>
            <h1 th:text="${product.name}">Nombre del Producto</h1>

            <div class="price-container">
                <span class="current-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</span>
            </div>

            <p class="description" th:text="${product.description}">
                Descripción detallada del producto aquí.
            </p>

            <div class="stock-status">
                    <span th:if="${product.stock > 0}" class="in-stock">
                        <i class="fas fa-check-circle"></i> Disponible (<span th:text="${product.stock}"></span>)
                    </span>
                <span th:unless="${product.stock > 0}" class="out-of-stock">
                        <i class="fas fa-times-circle"></i> Agotado
                    </span>
            </div>

            <div class="purchase-actions" th:if="${product.stock > 0} and user_id != -1">
                <input type="number" id="quantity" min="1" value="1" class="quantity-input">
                <button class="btn-add-cart" th:data-userid="${user_id}" th:data-productid="${product.id}" onclick="addToCart(this.getAttribute('data-userid'), this.getAttribute('data-productid'))">
                    Agregar al Carrito      <i class="fas fa-shopping-cart"></i>
                </button>
            </div>
            <div class="purchase-actions" th:if="${product.stock > 0} and user_id == -1">
                <input type="number" min="1" value="1" class="quantity-input">
                <button class="btn-add-cart" onclick="toggleVisibility('noLogued')">
                    Agregar al Carrito      <i class="fas fa-shopping-cart"></i>
                </button>
            </div>
            <div class="purchase-actions" th:if="${product.stock <= 0}">
                <button class="btn-add-cart">
                    No disponible      <i class="fas fa-shopping-cart"></i>
                </button>
            </div>
            <div class="d-flex justify-content-center mt-2">
                <form th:action="@{/view/products/delete/{id}(id=${product.id})}" th:method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger" sec:authorize="hasRole('ADMIN')"
                            onclick="return confirmarEliminacion(event);">
                        Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${product == null}" class="not-found-container">
        <h2>Producto no encontrado</h2>
        <p>Lo sentimos, el producto que buscas no existe o fue eliminado.</p>
        <a href="/" class="btn-back">Volver al inicio</a>
    </div>

</div>

<div th:replace="~{fragments/base :: footer}"></div>

<script th:src="@{/webjars/sweetalert2/dist/sweetalert2.min.js}"></script>
<script>
    function addToCart(userId, productId) {
        const quantity = document.getElementById('quantity').value;
        const data = {
            productId: productId,
            quantity: quantity
        };

        fetch('/users/addProduct/' + userId, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                Toast.fire({
                    title: 'Producto agregado al carrito',
                    icon: 'success',
                });
            } else {
                return response.text().then(text => { throw new Error(text) });
            }
        })
        .catch(error => {
            console.error('Error:', error);
            Swal.fire({
                title: 'Error al cargar el producto en el carrito',
                text: error,
                icon: 'error',
                confirmButtonText: 'Aceptar'
            });
        });
    }

    function confirmarEliminacion(event) {
        event.preventDefault();

        const form = event.target.closest('form');

        Swal.fire({
            title: '¿Desea eliminar el producto?',
            text: "No podrás revertir esta acción y los elementos se borraran de los carritos de los usuarios",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Eliminar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit();
            }
        });
    }
</script>

</body>
</html>
